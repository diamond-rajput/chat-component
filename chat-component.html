<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatFlow — Modern Messenger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #0f0f11;
  --bg1: #17171a;
  --bg2: #1e1e23;
  --bg3: #26262d;
  --bg4: #2e2e37;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text0: #f0eff5;
  --text1: #b4b3c4;
  --text2: #7a7990;
  --accent: #7c6af7;
  --accent2: #a89ff9;
  --accent-bg: rgba(124,106,247,0.12);
  --green: #3ecf8e;
  --green-bg: rgba(62,207,142,0.12);
  --red: #f97070;
  --amber: #f5a623;
  --bubble-me: #3b2fa8;
  --bubble-me2: #4d3fd4;
  --bubble-them: #26262d;
  --radius: 16px;
  --radius-sm: 8px;
  --radius-xs: 5px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --sidebar-w: 260px;
  --header-h: 58px;
}
[data-theme="light"] {
  --bg0: #f0eff8;
  --bg1: #ffffff;
  --bg2: #f5f4fc;
  --bg3: #ebe9f8;
  --bg4: #dddaf5;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text0: #1a1830;
  --text1: #4a4870;
  --text2: #8a88a8;
  --accent: #5b48e8;
  --accent2: #7c6af7;
  --accent-bg: rgba(91,72,232,0.1);
  --green: #1a9e6a;
  --green-bg: rgba(26,158,106,0.1);
  --bubble-me: #5b48e8;
  --bubble-me2: #7c6af7;
  --bubble-them: #ebe9f8;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg0); color: var(--text0); }

.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: 100vh;
  max-height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--bg1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-head {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo {
  display: flex; align-items: center; gap: 8px; flex: 1;
  font-weight: 600; font-size: 16px; letter-spacing: -0.3px; color: var(--text0);
}
.logo-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #a89ff9);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.theme-btn {
  width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border2);
  background: var(--bg3); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--text1); transition: all 0.15s;
}
.theme-btn:hover { background: var(--bg4); color: var(--text0); }

.sidebar-section-label {
  padding: 16px 16px 6px;
  font-size: 10px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text2);
}
.room-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
.room-list::-webkit-scrollbar { width: 0; }
.room-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 10px;
  border-radius: var(--radius-sm); cursor: pointer; transition: all 0.12s;
  margin-bottom: 2px; position: relative;
}
.room-item:hover { background: var(--bg3); }
.room-item.active { background: var(--accent-bg); }
.room-item.active .room-name { color: var(--accent2); font-weight: 500; }
.room-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.room-name { font-size: 14px; color: var(--text1); flex: 1; }
.room-badge {
  background: var(--accent); color: #fff; font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 99px; min-width: 18px; text-align: center;
}

.sidebar-divider { height: 1px; background: var(--border); margin: 8px 8px; }

.online-section { padding: 4px 8px 8px; }
.online-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text2); padding: 10px 8px 6px;
}
.user-item {
  display: flex; align-items: center; gap: 9px; padding: 6px 10px;
  border-radius: var(--radius-sm); cursor: pointer; transition: all 0.12s;
}
.user-item:hover { background: var(--bg3); }
.avatar {
  width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; position: relative;
}
.avatar .status-dot {
  position: absolute; bottom: -1px; right: -1px; width: 9px; height: 9px;
  border-radius: 50%; background: var(--green); border: 2px solid var(--bg1);
}
.user-name { font-size: 13px; color: var(--text1); flex: 1; }
.user-status { font-size: 11px; color: var(--text2); }

.me-section {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.me-name { font-size: 13px; font-weight: 500; color: var(--text0); }
.me-handle { font-size: 11px; color: var(--text2); }
.settings-btn {
  width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border2);
  background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--text2); transition: all 0.15s; margin-left: auto;
}
.settings-btn:hover { background: var(--bg3); color: var(--text1); }

/* ── MAIN AREA ── */
.main {
  display: flex; flex-direction: column; overflow: hidden; background: var(--bg0);
}

.chat-header {
  height: var(--header-h); padding: 0 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  background: var(--bg1); flex-shrink: 0;
}
.chat-room-icon { font-size: 20px; }
.chat-room-name { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
.chat-room-desc { font-size: 12px; color: var(--text2); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.header-btn {
  width: 34px; height: 34px; border-radius: var(--radius-sm); border: 1px solid var(--border2);
  background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: var(--text1); transition: all 0.12s;
}
.header-btn:hover { background: var(--bg3); color: var(--text0); }
.online-count {
  font-size: 12px; color: var(--green); background: var(--green-bg);
  padding: 4px 10px; border-radius: 99px; font-weight: 500;
}

/* ── MESSAGES ── */
.messages-area {
  flex: 1; overflow-y: auto; padding: 20px 20px 0;
  display: flex; flex-direction: column; gap: 2px;
  scroll-behavior: smooth;
}
.messages-area::-webkit-scrollbar { width: 4px; }
.messages-area::-webkit-scrollbar-track { background: transparent; }
.messages-area::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 99px; }

.day-divider {
  display: flex; align-items: center; gap: 12px; margin: 16px 0;
  color: var(--text2); font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
}
.day-divider::before, .day-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.msg-group { display: flex; flex-direction: column; gap: 2px; margin-bottom: 6px; }
.msg-row {
  display: flex; align-items: flex-end; gap: 10px;
}
.msg-row.me { flex-direction: row-reverse; }
.msg-avatar { width: 30px; flex-shrink: 0; }
.msg-avatar-img {
  width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 600;
}
.msg-row.continued .msg-avatar-img { visibility: hidden; }

.msg-content { max-width: 68%; display: flex; flex-direction: column; gap: 2px; }
.msg-row.me .msg-content { align-items: flex-end; }

.msg-sender {
  font-size: 12px; color: var(--text2); font-weight: 500;
  padding: 0 4px 2px; display: flex; align-items: center; gap: 6px;
}
.msg-time-small { font-size: 10px; color: var(--text2); font-weight: 400; }

.bubble {
  padding: 9px 13px; border-radius: 18px; font-size: 14px; line-height: 1.55;
  word-break: break-word; position: relative; cursor: pointer;
  transition: filter 0.12s;
}
.bubble:hover { filter: brightness(1.05); }
.bubble:hover .bubble-actions { opacity: 1; pointer-events: all; }

.bubble.them {
  background: var(--bubble-them); color: var(--text0);
  border-bottom-left-radius: 5px;
}
.bubble.me {
  background: var(--bubble-me); color: #fff;
  border-bottom-right-radius: 5px;
}
.msg-row .msg-content .bubble:not(:last-child) { border-bottom-left-radius: 5px; border-top-left-radius: 5px; }
.msg-row.me .msg-content .bubble:not(:last-child) { border-bottom-right-radius: 5px; border-top-right-radius: 5px; }
.msg-row .msg-content .bubble:not(:first-child) { border-top-left-radius: 5px; }
.msg-row.me .msg-content .bubble:not(:first-child) { border-top-right-radius: 5px; }

/* Reply quote */
.reply-quote {
  border-left: 3px solid var(--accent2); padding: 4px 8px; margin-bottom: 5px;
  background: rgba(255,255,255,0.06); border-radius: 0 6px 6px 0;
  font-size: 12px; color: var(--text1); cursor: pointer;
}
.reply-quote-name { font-weight: 600; color: var(--accent2); font-size: 11px; }
.bubble.me .reply-quote { background: rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.5); }
.bubble.me .reply-quote-name { color: rgba(255,255,255,0.8); }

/* Bubble actions */
.bubble-actions {
  position: absolute; top: -34px; right: 0; opacity: 0; pointer-events: none;
  display: flex; gap: 3px; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 4px; box-shadow: var(--shadow); transition: opacity 0.15s;
  z-index: 10;
}
.bubble.me .bubble-actions { right: auto; left: 0; }
.action-btn {
  width: 26px; height: 26px; border-radius: 7px; border: none;
  background: transparent; cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 13px; color: var(--text1);
  transition: all 0.1s;
}
.action-btn:hover { background: var(--bg4); color: var(--text0); }

/* Reactions */
.reactions {
  display: flex; gap: 4px; flex-wrap: wrap; margin-top: 3px;
}
.reaction {
  display: flex; align-items: center; gap: 3px; padding: 2px 7px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 99px; font-size: 13px; cursor: pointer; transition: all 0.12s;
}
.reaction:hover { background: var(--bg4); border-color: var(--accent); }
.reaction.mine { background: var(--accent-bg); border-color: var(--accent); }
.reaction-count { font-size: 11px; color: var(--text1); font-weight: 500; }

/* Read receipts */
.read-receipts {
  display: flex; margin-top: 3px; gap: -4px;
}
.read-avatar {
  width: 14px; height: 14px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 7px; font-weight: 700;
  border: 1.5px solid var(--bg0);
  margin-left: -3px;
}
.read-check { font-size: 10px; color: var(--accent2); margin-left: 4px; }

/* Edited badge */
.edited-badge { font-size: 10px; color: var(--text2); margin-left: 4px; font-style: italic; }

/* Media messages */
.media-img {
  max-width: 240px; max-height: 200px; border-radius: 12px;
  object-fit: cover; display: block; cursor: zoom-in;
  background: var(--bg4);
}
.media-file {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  background: rgba(255,255,255,0.06); border-radius: 10px; cursor: pointer;
  min-width: 180px;
}
.bubble.me .media-file { background: rgba(0,0,0,0.2); }
.media-file-icon { font-size: 24px; }
.media-file-name { font-size: 13px; font-weight: 500; color: var(--text0); }
.bubble.me .media-file-name { color: #fff; }
.media-file-size { font-size: 11px; color: var(--text2); }
.bubble.me .media-file-size { color: rgba(255,255,255,0.5); }

/* Voice message */
.voice-msg {
  display: flex; align-items: center; gap: 10px; min-width: 200px;
}
.voice-play {
  width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  font-size: 12px; transition: all 0.15s; flex-shrink: 0;
}
.voice-play:hover { border-color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.1); }
.bubble.them .voice-play { border-color: var(--accent); color: var(--accent); }
.bubble.them .voice-play:hover { background: var(--accent-bg); }
.voice-waveform {
  flex: 1; height: 28px; display: flex; align-items: center; gap: 2px; cursor: pointer;
}
.wave-bar {
  width: 3px; border-radius: 2px; background: rgba(255,255,255,0.35);
  transition: background 0.2s;
  flex-shrink: 0;
}
.bubble.them .wave-bar { background: var(--accent-bg); }
.wave-bar.played { background: rgba(255,255,255,0.85); }
.bubble.them .wave-bar.played { background: var(--accent); }
.voice-dur { font-size: 11px; color: rgba(255,255,255,0.5); }
.bubble.them .voice-dur { color: var(--text2); }

/* Video message */
.media-video-thumb {
  position: relative; width: 240px; height: 150px; border-radius: 12px;
  overflow: hidden; cursor: pointer; background: #000;
  display: flex; align-items: center; justify-content: center;
}
.video-play-btn {
  position: absolute; width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #111; transition: transform 0.15s;
}
.media-video-thumb:hover .video-play-btn { transform: scale(1.1); }
.video-thumb-bg {
  width: 100%; height: 100%; object-fit: cover; opacity: 0.7;
}

/* Typing indicator */
.typing-indicator {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0 12px; min-height: 40px;
}
.typing-bubbles {
  display: flex; align-items: center; gap: 3px;
  background: var(--bubble-them); padding: 10px 14px;
  border-radius: 18px 18px 18px 5px;
}
.typing-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--text2);
  animation: typing 1.4s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}
.typing-label { font-size: 12px; color: var(--text2); }

/* ── COMPOSER ── */
.composer-area {
  padding: 12px 20px 16px; background: var(--bg1);
  border-top: 1px solid var(--border); flex-shrink: 0;
}

.reply-preview {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  background: var(--bg3); border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  border-bottom: 1px solid var(--border); margin: -1px -1px 0;
}
.reply-preview-line { width: 3px; height: 100%; min-height: 28px; background: var(--accent); border-radius: 2px; flex-shrink: 0; }
.reply-preview-content { flex: 1; }
.reply-preview-name { font-size: 12px; font-weight: 600; color: var(--accent2); }
.reply-preview-text { font-size: 12px; color: var(--text1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
.reply-close {
  width: 22px; height: 22px; border-radius: 50%; border: none;
  background: var(--bg4); cursor: pointer; font-size: 12px; color: var(--text1);
  display: flex; align-items: center; justify-content: center;
}
.reply-close:hover { background: var(--border2); color: var(--text0); }

.composer-toolbar {
  display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap;
}
.fmt-btn {
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border2);
  background: transparent; cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 13px; color: var(--text1); transition: all 0.1s;
}
.fmt-btn:hover { background: var(--bg3); color: var(--text0); }
.fmt-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent2); }
.fmt-divider { width: 1px; background: var(--border2); margin: 0 2px; }

.composer-box {
  display: flex; align-items: flex-end; gap: 8px;
}
.composer-input-wrap {
  flex: 1; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 14px; display: flex; align-items: flex-end; gap: 4px;
  padding: 8px 12px; transition: border-color 0.15s;
}
.composer-input-wrap:focus-within { border-color: var(--accent); }
.composer-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: var(--font); font-size: 14px; color: var(--text0);
  line-height: 1.5; resize: none; max-height: 120px; min-height: 22px;
}
.composer-input::placeholder { color: var(--text2); }
.composer-btns-inline { display: flex; gap: 2px; align-items: flex-end; flex-shrink: 0; }
.inline-btn {
  width: 28px; height: 28px; border-radius: 8px; border: none;
  background: transparent; cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 16px; color: var(--text2); transition: all 0.12s;
}
.inline-btn:hover { color: var(--text1); background: var(--bg4); }

.send-btn {
  width: 40px; height: 40px; border-radius: 12px; border: none;
  background: var(--accent); cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 16px; color: #fff;
  transition: all 0.12s; flex-shrink: 0;
}
.send-btn:hover { background: var(--accent2); transform: scale(1.05); }
.send-btn:active { transform: scale(0.97); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── EMOJI PICKER ── */
.emoji-picker {
  position: absolute; bottom: 100%; right: 0; width: 300px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 14px; box-shadow: var(--shadow); z-index: 100;
  overflow: hidden; display: none; flex-direction: column;
}
.emoji-picker.open { display: flex; }
.emoji-search {
  padding: 10px; border-bottom: 1px solid var(--border);
}
.emoji-search input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 8px; padding: 6px 10px; font-family: var(--font);
  font-size: 13px; color: var(--text0); outline: none;
}
.emoji-search input::placeholder { color: var(--text2); }
.emoji-categories {
  display: flex; gap: 2px; padding: 6px 8px;
  border-bottom: 1px solid var(--border); overflow-x: auto;
}
.emoji-cat-btn {
  width: 28px; height: 28px; border-radius: 6px; border: none;
  background: transparent; cursor: pointer; font-size: 15px;
  transition: all 0.1s; flex-shrink: 0;
}
.emoji-cat-btn:hover, .emoji-cat-btn.active { background: var(--bg4); }
.emoji-grid {
  display: grid; grid-template-columns: repeat(8, 1fr);
  gap: 1px; padding: 8px; max-height: 200px; overflow-y: auto;
}
.emoji-grid::-webkit-scrollbar { width: 0; }
.emoji-item {
  width: 32px; height: 32px; display: flex; align-items: center;
  justify-content: center; font-size: 18px; cursor: pointer;
  border-radius: 6px; transition: background 0.1s;
}
.emoji-item:hover { background: var(--bg4); }

/* ── MEDIA UPLOAD PREVIEW ── */
.upload-preview {
  display: flex; gap: 8px; padding: 8px 0; overflow-x: auto; flex-wrap: nowrap;
}
.upload-preview::-webkit-scrollbar { height: 0; }
.preview-item {
  position: relative; flex-shrink: 0;
  width: 64px; height: 64px; border-radius: 10px; overflow: hidden;
  background: var(--bg3); display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border2);
}
.preview-img { width: 100%; height: 100%; object-fit: cover; }
.preview-icon { font-size: 24px; }
.preview-remove {
  position: absolute; top: 2px; right: 2px; width: 18px; height: 18px;
  border-radius: 50%; background: rgba(0,0,0,0.7); border: none; cursor: pointer;
  font-size: 10px; color: #fff; display: flex; align-items: center; justify-content: center;
}
.preview-file-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.6); font-size: 9px; color: #fff;
  text-align: center; padding: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── LIGHTBOX ── */
.lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000;
  display: none; align-items: center; justify-content: center;
}
.lightbox.open { display: flex; }

const DB = {

  getMessages(room) {
    try { return JSON.parse(localStorage.getItem('cf_msgs_' + room) || '[]'); } catch { return []; }
  },
  saveMessages(room, msgs) {
    localStorage.setItem('cf_msgs_' + room, JSON.stringify(msgs));
    bc.postMessage({ type: 'msgs_updated', room });
  },
  addMessage(room, msg) {
    const msgs = this.getMessages(room);
    msgs.push(msg);
    this.saveMessages(room, msgs);
    return msg;
  },
  updateMessage(room, id, updates) {
    const msgs = this.getMessages(room);
    const i = msgs.findIndex(m => m.id === id);
    if (i >= 0) { msgs[i] = { ...msgs[i], ...updates }; this.saveMessages(room, msgs); }
  },
  deleteMessage(room, id) {
    const msgs = this.getMessages(room).filter(m => m.id !== id);
    this.saveMessages(room, msgs);
  }
};

function uid() { return '_' + Math.random().toString(36).slice(2,11); }
function getUser(id) { return USERS.find(u => u.id === id) || USERS[0]; }
function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function formatDay(ts) {
  const d = new Date(ts); const now = new Date();
  const diff = Math.floor((now - d) / 86400000);
  if (diff === 0) return 'Today'; if (diff === 1) return 'Yesterday';
  return d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
}
function markdownToHtml(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/&lt;strong&gt;/g,'<strong>').replace(/&lt;\/strong&gt;/g,'</strong>')
    .replace(/&lt;em&gt;/g,'<em>').replace(/&lt;\/em&gt;/g,'</em>')
    .replace(/&lt;code&gt;/g,'<code>').replace(/&lt;\/code&gt;/g,'</code>');
}

}

  document.getElementById('toastText').textContent = text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function genWaveform(n=40) {
  let bars = '';
  const heights = Array.from({length:n}, () => 4 + Math.random()*24);
  for (let i = 0; i < n; i++) bars += `<div class="wave-bar" style="height:${heights[i]}px"></div>`;
  return bars;
}

// ══════════════════════════════════════════════
// RENDER SIDEBAR
// ══════════════════════════════════════════════

// ══════════════════════════════════════════════
// RENDER MESSAGES
// ══════════════════════════════════════════════
function renderMessages(scrollToBottom=false) {
  const msgs = DB.getMessages(state.room);
  const area = document.getElementById('messagesArea');
  const wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80;

  let html = '';
  let lastDay = '';
  let lastUserId = '';
  let lastTs = 0;

  msgs.forEach((msg, idx) => {
    const user = getUser(msg.userId);
    const isMe = msg.userId === ME.id || msg.isMe;
    const dayLabel = formatDay(msg.ts);
    const continued = lastUserId === msg.userId && (msg.ts - lastTs) < 300000;
    lastUserId = msg.userId; lastTs = msg.ts;

    if (dayLabel !== lastDay) {
      html += `<div class="day-divider">${dayLabel}</div>`;
      lastDay = dayLabel;
    }

    const replyMsg = msg.replyTo ? msgs.find(m => m.id === msg.replyTo) : null;
    const replyUser = replyMsg ? getUser(replyMsg.userId) : null;

    // Build bubble content
    let content = '';
    if (msg.type === 'image') {
      content = `<img class="media-img" src="${msg.mediaUrl}" alt="image" onclick="openLightbox('${msg.mediaUrl}')">`;
      if (msg.mediaCaption) content += `<div style="font-size:13px;margin-top:5px;">${msg.mediaCaption}</div>`;
    } else if (msg.type === 'file') {
      content = `<div class="media-file">
        <span class="media-file-icon">${msg.fileIcon||'📎'}</span>
        <div><div class="media-file-name">${msg.fileName}</div><div class="media-file-size">${msg.fileSize}</div></div>
        <span style="margin-left:auto;font-size:13px;opacity:0.6">⬇</span>
      </div>`;
    } else if (msg.type === 'voice') {
      content = `<div class="voice-msg">
        <div class="voice-play" onclick="toggleVoice('${msg.id}')">▶</div>
        <div class="voice-waveform" id="wv_${msg.id}">${genWaveform()}</div>
        <span class="voice-dur">${msg.duration||'0:30'}</span>
      </div>`;
    } else if (msg.type === 'video') {
      content = `<div class="media-video-thumb" onclick="showToast('🎬','Video playback coming soon')">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;font-size:40px;">🎬</div>
        <div class="video-play-btn">▶</div>
      </div>`;
    } else {
      content = `<div class="msg-text">${markdownToHtml(msg.text)}</div>`;
    }

    const replyHtml = replyMsg ? `
      <div class="reply-quote" onclick="scrollToMsg('${replyMsg.id}')">
        <div class="reply-quote-name">${replyUser.name}</div>
        <div>${replyMsg.type==='text'?(replyMsg.text||'').slice(0,80):'[media]'}</div>
      </div>` : '';

    const editedHtml = msg.edited ? `<span class="edited-badge">(edited)</span>` : '';

    // Reactions
    const reactionHtml = Object.keys(msg.reactions||{}).length ? `
      <div class="reactions">
        ${Object.entries(msg.reactions).map(([emoji, users]) => `
          <div class="reaction ${users.includes(ME.id)?'mine':''}" onclick="toggleReaction('${msg.id}','${emoji}')">
            ${emoji} <span class="reaction-count">${users.length}</span>
          </div>`).join('')}
      </div>` : '';

    // Read receipts (for my messages)
    let readHtml = '';
    if (isMe && msg.readBy && msg.readBy.length > 1) {
      const readers = msg.readBy.filter(id => id !== ME.id).slice(0,3);
      readHtml = `<div class="read-receipts" style="justify-content:flex-end;">
        ${readers.map(id => { const u = getUser(id); return `<div class="read-avatar" style="background:${u.bg};color:${u.color};">${u.initials[0]}</div>`; }).join('')}
        <span class="read-check">✓✓</span>
      </div>`;
    }

    // Actions
    const actionsHtml = `<div class="bubble-actions">
      <button class="action-btn" onclick="quickReact('${msg.id}','👍')">👍</button>
      <button class="action-btn" onclick="quickReact('${msg.id}','❤️')">❤️</button>
      <button class="action-btn" onclick="quickReact('${msg.id}','😂')">😂</button>
      <button class="action-btn" onclick="replyTo('${msg.id}')" title="Reply">↩</button>
      ${isMe ? `<button class="action-btn" onclick="editMsg('${msg.id}')" title="Edit">✏️</button>` : ''}
      ${isMe ? `<button class="action-btn" onclick="deleteMsg('${msg.id}')" title="Delete">🗑️</button>` : ''}
    </div>`;

    const senderHtml = !continued ? `
      <div class="msg-sender">
        ${!isMe ? `<span style="color:${user.color};font-weight:600;">${user.name}</span>` : ''}
        <span class="msg-time-small">${formatTime(msg.ts)}</span>
      </div>` : '';

    html += `
      <div class="msg-group" id="msg_${msg.id}">
        <div class="msg-row ${isMe?'me':''} ${continued?'continued':''}">
          <div class="msg-avatar">${!isMe ? (continued ? '<div class="msg-avatar-img"></div>' : `<div class="msg-avatar-img" style="background:${user.bg};color:${user.color};font-size:11px;font-weight:600;">${user.initials}</div>`) : ''}</div>
          <div class="msg-content">
            ${senderHtml}
            <div class="bubble ${isMe?'me':'them'}" data-id="${msg.id}">
              ${actionsHtml}
              ${replyHtml}
              ${content}
              ${editedHtml}
            </div>
            ${reactionHtml}
            ${readHtml}
          </div>
        </div>
      </div>`;
  });

  area.innerHTML = html;

  if (scrollToBottom || wasAtBottom) {
    setTimeout(() => { area.scrollTop = area.scrollHeight; }, 10);
  }
}

// ══════════════════════════════════════════════
// MESSAGE ACTIONS
// ══════════════════════════════════════════════
window.toggleReaction = (msgId, emoji) => {
  const msgs = DB.getMessages(state.room);
  const msg = msgs.find(m => m.id === msgId);
  if (!msg) return;
  msg.reactions = msg.reactions || {};
  msg.reactions[emoji] = msg.reactions[emoji] || [];
  const i = msg.reactions[emoji].indexOf(ME.id);
  if (i >= 0) msg.reactions[emoji].splice(i, 1);
  else msg.reactions[emoji].push(ME.id);
  if (!msg.reactions[emoji].length) delete msg.reactions[emoji];
  DB.saveMessages(state.room, msgs);
  renderMessages();
};

window.quickReact = (msgId, emoji) => toggleReaction(msgId, emoji);

window.replyTo = (msgId) => {
  const msg = DB.getMessages(state.room).find(m => m.id === msgId);
  if (!msg) return;
  state.replyTo = msg;
  const wrap = document.getElementById('replyPreviewWrap');
  const user = getUser(msg.userId);
  wrap.style.display = 'block';
  wrap.innerHTML = `<div class="reply-preview">
    <div class="reply-preview-line"></div>
    <div class="reply-preview-content">
      <div class="reply-preview-name">Replying to ${user.name}</div>
      <div class="reply-preview-text">${msg.text||'[media]'}</div>
    </div>
    <button class="reply-close" onclick="clearReply()">✕</button>
  </div>`;
  document.getElementById('composerInput').focus();
};

window.clearReply = () => {
  state.replyTo = null;
  document.getElementById('replyPreviewWrap').style.display = 'none';
  document.getElementById('replyPreviewWrap').innerHTML = '';
};

window.editMsg = (msgId) => {
  const msg = DB.getMessages(state.room).find(m => m.id === msgId);
  if (!msg) return;
  state.editingId = msgId;
  const modal = document.getElementById('editModal');
  document.getElementById('editInput').value = msg.text || '';
  modal.classList.add('open');
  document.getElementById('editInput').focus();
};

window.deleteMsg = (msgId) => {
  DB.deleteMessage(state.room, msgId);
  renderMessages();
  showToast('🗑️', 'Message deleted');
};

window.scrollToMsg = (msgId) => {
  const el = document.getElementById('msg_' + msgId);
  if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.style.background = 'var(--accent-bg)'; setTimeout(() => el.style.background = '', 1200); }
};

window.openLightbox = (url) => {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
};

window.toggleVoice = (msgId) => {
  const wv = document.getElementById('wv_' + msgId);
  if (!wv) return;
  const bars = wv.querySelectorAll('.wave-bar');
  let played = 0;
  const total = bars.length;
  if (state.voicePlaying === msgId) {
    clearInterval(state.voiceTimer);
    state.voicePlaying = null;
    bars.forEach(b => b.classList.remove('played'));
    return;
  }
  state.voicePlaying = msgId;
  bars.forEach(b => b.classList.remove('played'));
  let i = 0;
  state.voiceTimer = setInterval(() => {
    if (i < total) { bars[i].classList.add('played'); i++; }
    else { clearInterval(state.voiceTimer); state.voicePlaying = null; }
  }, 50);
};

// ══════════════════════════════════════════════
// SEND MESSAGE
// ══════════════════════════════════════════════
function sendMessage() {
  const input = document.getElementById('composerInput');
  const text = input.value.trim();
  if (!text && !state.uploads.length) return;

  if (state.uploads.length) {
    state.uploads.forEach(u => {
      const msg = {
        id: uid(), userId: ME.id, ts: Date.now(), isMe: true,
        type: u.type, reactions: {}, readBy: [ME.id],
        ...(u.type === 'image' ? { mediaUrl: u.url, mediaCaption: text } : {}),
        ...(u.type === 'file' ? { fileName: u.name, fileSize: u.size, fileIcon: u.icon } : {}),
        ...(u.type === 'voice' ? { duration: '0:' + (10 + Math.floor(Math.random()*50)) } : {}),
        replyTo: state.replyTo?.id || null,
      };
      DB.addMessage(state.room, msg);
    });
    state.uploads = [];
    renderUploadPreview();
  }

  if (text) {
    const msg = {
      id: uid(), userId: ME.id, text, ts: Date.now(), type: 'text',
      reactions: {}, readBy: [ME.id], isMe: true,
      replyTo: state.replyTo?.id || null,
    };
    DB.addMessage(state.room, msg);
  }

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  clearReply();
  renderMessages(true);
  simulateResponse();
}

function simulateResponse() {
  const responders = USERS.filter(u => u.id !== ME.id);
  const responder = responders[Math.floor(Math.random() * responders.length)];
  showTypingFrom(responder.name);
  setTimeout(() => {
    hideTyping();
    const responses = [
      'Got it! Thanks for the update 👍',
      'Sounds great, I\'ll look into it.',
      'On it! 🚀',
      'Makes sense. Will circle back after standup.',
      "Interesting point — let me check with the team.",
      'Agreed! This is going to be a big improvement 🔥',
      '100% — let\'s sync later this week?',
      'Love the direction. Keep it up! 💪',
    ];
    const msg = {
      id: uid(), userId: responder.id,
      text: responses[Math.floor(Math.random()*responses.length)],
      ts: Date.now(), type: 'text', reactions: {}, readBy: [ME.id, responder.id],
    };
    DB.addMessage(state.room, msg);
    renderMessages(true);
    UNREAD[state.room] = 0;
    renderSidebar();
  }, 1500 + Math.random() * 1500);
}

function showTypingFrom(name) {
  const ti = document.getElementById('typingIndicator');
  const ta = document.getElementById('typingAvatar');
  const tl = document.getElementById('typingLabel');
  const user = USERS.find(u => u.name === name) || USERS[1];
  ta.style.cssText = `width:24px;height:24px;font-size:10px;background:${user.bg};color:${user.color};`;
  ta.textContent = user.initials;
  tl.textContent = `${user.name.split(' ')[0]} is typing…`;
  ti.style.display = 'flex';
}

function hideTyping() {
  document.getElementById('typingIndicator').style.display = 'none';
}

// ══════════════════════════════════════════════
// ROOM SWITCH
// ══════════════════════════════════════════════
function switchRoom(roomId) {
  state.room = roomId;
  UNREAD[roomId] = 0;
  clearReply();
  const room = ROOMS.find(r => r.id === roomId);
  document.getElementById('headerIcon').textContent = room.icon;
  document.getElementById('headerName').textContent = '# ' + room.name;
  document.getElementById('headerDesc').textContent = room.desc;
  renderSidebar();
  renderMessages(true);
}

// ══════════════════════════════════════════════
// EMOJI PICKER
// ══════════════════════════════════════════════
function initEmojiPicker() {
  const cats = document.getElementById('emojiCats');
  cats.innerHTML = EMOJI_CATEGORIES.map((c,i) =>
    `<button class="emoji-cat-btn ${i===0?'active':''}" data-cat="${i}" title="${c.name}">${c.label}</button>`
  ).join('');
  showEmojiCategory(0);
  cats.querySelectorAll('.emoji-cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      cats.querySelectorAll('.emoji-cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      showEmojiCategory(parseInt(btn.dataset.cat));
    });
  });

  document.getElementById('emojiSearch').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    if (!q) { showEmojiCategory(0); return; }
    const all = EMOJI_CATEGORIES.flatMap(c => c.emojis);
    const filtered = all.filter(em => em.includes(q));
    renderEmojiGrid(filtered.slice(0,64));
  });
}

function showEmojiCategory(idx) {
  renderEmojiGrid(EMOJI_CATEGORIES[idx].emojis);
}

function renderEmojiGrid(emojis) {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = emojis.map(e =>
    `<div class="emoji-item" onclick="insertEmoji('${e}')">${e}</div>`
  ).join('');
}

window.insertEmoji = (emoji) => {
  const input = document.getElementById('composerInput');
  const pos = input.selectionStart;
  const val = input.value;
  input.value = val.slice(0, pos) + emoji + val.slice(pos);
  input.setSelectionRange(pos + emoji.length, pos + emoji.length);
  input.focus();
  document.getElementById('sendBtn').disabled = !input.value.trim();
};

// ══════════════════════════════════════════════
// UPLOADS
// ══════════════════════════════════════════════
function renderUploadPreview() {
  const wrap = document.getElementById('uploadPreviewWrap');
  if (!state.uploads.length) { wrap.style.display = 'none'; wrap.innerHTML = ''; return; }
  wrap.style.display = 'block';
  wrap.innerHTML = `<div class="upload-preview">
    ${state.uploads.map((u, i) => `
      <div class="preview-item">
        ${u.type === 'image' ? `<img class="preview-img" src="${u.url}">` : `<div class="preview-icon">${u.icon}</div>`}
        <div class="preview-file-label">${u.name||u.type}</div>
        <button class="preview-remove" onclick="removeUpload(${i})">✕</button>
      </div>`).join('')}
  </div>`;
}

window.removeUpload = (i) => { state.uploads.splice(i, 1); renderUploadPreview(); };

function fakeUpload(files, isImage) {
  Array.from(files).forEach(file => {
    if (isImage && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = (e) => {
        state.uploads.push({ type: 'image', url: e.target.result, name: file.name });
        renderUploadPreview();
        document.getElementById('sendBtn').disabled = false;
      };
      reader.readAsDataURL(file);
    } else if (isImage && file.type.startsWith('video/')) {
      state.uploads.push({ type: 'video', icon: '🎬', name: file.name, size: (file.size/1048576).toFixed(1)+' MB' });
      renderUploadPreview();
      document.getElementById('sendBtn').disabled = false;
    } else {
      const icons = { pdf: '📄', doc: '📝', xls: '📊', zip: '🗜️', mp3: '🎵', default: '📎' };
      const ext = file.name.split('.').pop().toLowerCase();
      state.uploads.push({ type: 'file', icon: icons[ext]||icons.default, name: file.name, size: (file.size/1048576).toFixed(2)+' MB' });
      renderUploadPreview();
      document.getElementById('sendBtn').disabled = false;
    }
  });
}

// ══════════════════════════════════════════════
// FORMAT BUTTONS
// ══════════════════════════════════════════════
function applyFormat(fmt) {
  const input = document.getElementById('composerInput');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const sel = input.value.slice(start, end);
  const markers = { bold: '**', italic: '*', code: '`' };
  const m = markers[fmt];
  if (!m) return;
  const newVal = input.value.slice(0, start) + m + sel + m + input.value.slice(end);
  input.value = newVal;
  input.setSelectionRange(start + m.length, end + m.length);
  input.focus();
  document.getElementById('sendBtn').disabled = !input.value.trim();
}

// ══════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('themeBtn').textContent = state.theme === 'dark' ? '🌙' : '☀️';
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function init() {
  seedMessages();
  initEmojiPicker();
  switchRoom('general');

  // Composer auto-resize
  const input = document.getElementById('composerInput');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    document.getElementById('sendBtn').disabled = !input.value.trim() && !state.uploads.length;
    // Typing broadcast
    bc.postMessage({ type: 'typing', user: ME.name });
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  document.getElementById('themeBtn').addEventListener('click', toggleTheme);

  document.getElementById('emojiBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    const picker = document.getElementById('emojiPicker');
    picker.classList.toggle('open');
    state.emojiOpen = picker.classList.contains('open');
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.emoji-picker-wrap')) {
      document.getElementById('emojiPicker').classList.remove('open');
    }
  });

  document.getElementById('attachBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('imgBtn').addEventListener('click', () => document.getElementById('imageInput').click());
  document.getElementById('fileInput').addEventListener('change', (e) => fakeUpload(e.target.files, false));
  document.getElementById('imageInput').addEventListener('change', (e) => fakeUpload(e.target.files, true));

  document.getElementById('voiceBtn').addEventListener('click', () => {
    state.uploads.push({ type: 'voice', icon: '🎤', name: 'Voice message', duration: '0:' + (10 + Math.floor(Math.random()*50)) });
    renderUploadPreview();
    document.getElementById('sendBtn').disabled = false;
    showToast('🎤', 'Voice message recorded (demo)');
  });

  document.getElementById('lightboxClose').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));
  document.getElementById('lightbox').addEventListener('click', (e) => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });

  document.getElementById('editCancel').addEventListener('click', () => {
    document.getElementById('editModal').classList.remove('open');
    state.editingId = null;
  });

  document.getElementById('editSave').addEventListener('click', () => {
    const newText = document.getElementById('editInput').value.trim();
    if (newText && state.editingId) {
      DB.updateMessage(state.room, state.editingId, { text: newText, edited: true });
      document.getElementById('editModal').classList.remove('open');
      state.editingId = null;
      renderMessages();
      showToast('✏️', 'Message edited');
    }
  });

  document.querySelector('.fmt-btn[data-fmt="bold"]').addEventListener('click', () => applyFormat('bold'));
  document.querySelector('.fmt-btn[data-fmt="italic"]').addEventListener('click', () => applyFormat('italic'));
  document.querySelector('.fmt-btn[data-fmt="code"]').addEventListener('click', () => applyFormat('code'));

  // Simulate someone coming online occasionally
  setInterval(() => {
    const randUser = USERS[1 + Math.floor(Math.random() * 4)];
    showToast('🟢', `${randUser.name.split(' ')[0]} is now online`);
  }, 25000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
